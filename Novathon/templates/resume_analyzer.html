<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resume Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="top-right-link">
    <a href="/">Back to Portal</a>
</div>

<div class="page-shell">
    <div class="page-card">
        <div class="page-header">
            <h1>Resume Analyzer</h1>
            <p class="page-subtitle">Get quick, AI-like feedback for your resume content.</p>
        </div>

        <form class="stacked-form" method="POST">
            <label>Paste Resume Summary / Highlights</label>
            <textarea name="resume_text" rows="6" placeholder="Paste summary, experience bullets, or skills section..."></textarea>

            <label>Skills (comma separated)</label>
            <input type="text" name="skills" placeholder="Python, SQL, React">

            <label>Projects Completed</label>
            <input type="number" name="projects" min="0" placeholder="0">

            <label>Internships</label>
            <input type="number" name="internships" min="0" placeholder="0">

            <button type="submit">Analyze</button>
        </form>

        {% if score is not none %}
        <div class="result-card">
            <strong>Resume Strength Score: {{score}} / 100</strong>
            <ul class="chip-list" style="margin-top:10px;">
                {% for item in feedback %}
                <li class="chip" style="background:#5b86e5;">{{item}}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
    </div>
</div>

</body>
</html>
